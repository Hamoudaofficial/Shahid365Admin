<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shahid365 — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════ RESET & VARS ═══════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040411;--bg1:#07071C;--bg2:#0d0d20;--bg3:#111128;
  --glass:rgba(255,255,255,.045);--gb:rgba(255,255,255,.08);--gb2:rgba(255,255,255,.13);
  --a:#4F8FFF;--a2:#2D6FFF;--r:#FF5F6D;--go:#FFD166;--gr:#4ADE80;--pu:#9B7FFF;
  --t1:#fff;--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.32);--t4:rgba(255,255,255,.15);
  --f:'Cairo',sans-serif;--fo:'Oswald',sans-serif;
  --sb:248px;--top:60px;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
  --shadow:0 24px 64px rgba(0,0,0,.55);
}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--t1);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(79,143,255,.3);border-radius:4px}
img{display:block;max-width:100%}
button,input,select,textarea{font-family:var(--f)}
button{cursor:pointer;border:none;background:none;color:inherit}

/* ═══════════ GLASS ═══════════ */
.gl{background:var(--glass);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--gb)}
.gl2{background:rgba(255,255,255,.06);backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);border:1px solid var(--gb2)}

/* ═══════════ BUTTONS ═══════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:var(--r12);font-weight:700;font-size:13px;cursor:pointer;border:none;transition:all .2s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;line-height:1}
.bp{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;box-shadow:0 4px 16px rgba(79,143,255,.28)}.bp:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,143,255,.45)}
.bs{background:rgba(255,255,255,.07);color:var(--t1);border:1px solid rgba(255,255,255,.12)}.bs:hover{background:rgba(255,255,255,.13)}
.br{background:rgba(255,95,109,.14);color:var(--r);border:1px solid rgba(255,95,109,.28)}.br:hover{background:rgba(255,95,109,.24)}
.bg{background:rgba(74,222,128,.12);color:var(--gr);border:1px solid rgba(74,222,128,.25)}.bg:hover{background:rgba(74,222,128,.22)}
.bgo{background:rgba(255,209,102,.1);color:var(--go);border:1px solid rgba(255,209,102,.25)}.bgo:hover{background:rgba(255,209,102,.2)}
.bpu{background:rgba(155,127,255,.12);color:var(--pu);border:1px solid rgba(155,127,255,.28)}.bpu:hover{background:rgba(155,127,255,.22)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:9px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:7px}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-icon{width:34px;height:34px;padding:0;border-radius:9px;flex-shrink:0}

/* ═══════════ BADGES ═══════════ */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.3px;gap:4px}
.bb{background:rgba(79,143,255,.18);color:var(--a);border:1px solid rgba(79,143,255,.28)}
.bg2{background:rgba(74,222,128,.14);color:var(--gr);border:1px solid rgba(74,222,128,.24)}
.br2{background:rgba(255,95,109,.18);color:var(--r);border:1px solid rgba(255,95,109,.28)}
.bgo2{background:rgba(255,209,102,.13);color:var(--go);border:1px solid rgba(255,209,102,.22)}
.bpu2{background:rgba(155,127,255,.12);color:var(--pu);border:1px solid rgba(155,127,255,.22)}

/* ═══════════ INPUTS ═══════════ */
.inp{width:100%;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.11);border-radius:var(--r12);padding:11px 15px;color:var(--t1);font-size:13.5px;outline:none;transition:all .2s;resize:none}
.inp:focus{border-color:rgba(79,143,255,.5);background:rgba(255,255,255,.085);box-shadow:0 0 0 3px rgba(79,143,255,.1)}
.inp::placeholder{color:var(--t3)}
.inp-label{display:block;font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px}
.sel{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.11);border-radius:var(--r12);padding:11px 15px;color:var(--t1);font-size:13.5px;outline:none;cursor:pointer;width:100%;-webkit-appearance:none;transition:border-color .2s}
.sel:focus{border-color:rgba(79,143,255,.5)}
.sel option{background:#07071C;color:#fff}
.inp-wrap{position:relative;width:100%}
.inp-icon{position:absolute;top:50%;transform:translateY(-50%);opacity:.4;font-size:14px;pointer-events:none}
[dir="rtl"] .inp-icon{right:14px}[dir="ltr"] .inp-icon{left:14px}
[dir="rtl"] .inp-with-icon{padding-right:40px}[dir="ltr"] .inp-with-icon{padding-left:40px}

/* ═══════════ TOGGLE ═══════════ */
.tgl{position:relative;width:46px;height:26px;background:rgba(255,255,255,.1);border-radius:999px;cursor:pointer;transition:background .28s;border:1px solid rgba(255,255,255,.13);flex-shrink:0}
.tgl.on{background:var(--a);border-color:var(--a)}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 5px rgba(0,0,0,.3)}
.tgl.on::after{transform:translateX(20px)}

/* ═══════════ RANGE ═══════════ */
.range{width:100%;-webkit-appearance:none;height:4px;border-radius:4px;background:rgba(255,255,255,.12);outline:none;cursor:pointer;accent-color:var(--a)}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--a);cursor:pointer;box-shadow:0 0 6px rgba(79,143,255,.5)}

/* ═══════════ LAYOUT ═══════════ */
#app-wrap{display:flex;min-height:100vh}
#sidebar{width:var(--sb);min-height:100vh;position:fixed;top:0;bottom:0;z-index:100;display:flex;flex-direction:column;border-radius:0;border-top:none;border-bottom:none;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
[dir="rtl"] #sidebar{right:0;border-left:1px solid rgba(255,255,255,.06);border-right:none}
[dir="ltr"] #sidebar{left:0;border-right:1px solid rgba(255,255,255,.06);border-left:none}
#sidebar::-webkit-scrollbar{display:none}
#main{flex:1;display:flex;flex-direction:column;min-height:100vh}
[dir="rtl"] #main{margin-right:var(--sb)}
[dir="ltr"] #main{margin-left:var(--sb)}
#topbar{height:var(--top);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(4,4,17,.88);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;flex-shrink:0}
#content{flex:1;padding:28px 32px;overflow-y:auto}

/* ═══════════ SIDEBAR ═══════════ */
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-shrink:0}
.sb-logo-icon{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 16px rgba(79,143,255,.4);flex-shrink:0}
.sb-logo-text{font-family:var(--fo);font-size:17px;font-weight:700;letter-spacing:-.3px}
.sb-section{padding:6px 12px 4px;font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-top:4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:11px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--t2);transition:all .18s;margin:2px 10px;border:1px solid transparent;position:relative}
.sb-item:hover{color:var(--t1);background:rgba(79,143,255,.07)}
.sb-item.active{color:var(--a);background:rgba(79,143,255,.11);border-color:rgba(79,143,255,.18)}
.sb-item-icon{font-size:17px;flex-shrink:0;width:20px;text-align:center}
.sb-item-label{flex:1}
.sb-badge{background:rgba(255,95,109,.18);color:var(--r);border:1px solid rgba(255,95,109,.28);padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.sb-footer{padding:12px;margin-top:auto;border-top:1px solid rgba(255,255,255,.06)}

/* ═══════════ TOPBAR ═══════════ */
.top-title{font-family:var(--fo);font-size:18px;font-weight:700;letter-spacing:-.2px}
.top-right{display:flex;align-items:center;gap:10px}
.top-avatar{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

/* ═══════════ PAGE ═══════════ */
.page-title{font-family:var(--fo);font-size:24px;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.sec-bar{width:4px;height:26px;background:linear-gradient(180deg,var(--a),var(--a2));border-radius:999px;flex-shrink:0}
.page-actions{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}

/* ═══════════ STAT CARDS ═══════════ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:28px}
.stat-card{border-radius:var(--r20);padding:22px;transition:all .25s cubic-bezier(.34,1.56,.64,1);cursor:default}
.stat-card:hover{transform:translateY(-4px)}
.stat-icon{font-size:30px;margin-bottom:10px}
.stat-val{font-family:var(--fo);font-size:38px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-label{font-size:13px;color:var(--t2)}

/* ═══════════ TABLE ═══════════ */
.tbl-wrap{border-radius:var(--r16);overflow:hidden;border:1px solid rgba(255,255,255,.07)}
.tbl-head{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.025);flex-wrap:wrap;gap:10px}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid rgba(255,255,255,.07)}
th{padding:11px 16px;text-align:right;font-size:10.5px;color:var(--t3);font-weight:700;letter-spacing:.7px;text-transform:uppercase;white-space:nowrap}
[dir="ltr"] th{text-align:left}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.035)}
tbody tr:last-child{border-bottom:none}
td{padding:12px 16px;font-size:13.5px;vertical-align:middle}

/* ═══════════ CARD ═══════════ */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:var(--r16);padding:20px;transition:all .22s}
.card:hover{background:rgba(255,255,255,.065);border-color:rgba(255,255,255,.12)}

/* ═══════════ MODAL ═══════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);z-index:800;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--bg1);border:1px solid rgba(255,255,255,.1);border-radius:var(--r24);padding:0;width:100%;max-width:680px;margin:auto;position:relative;animation:slideUp .28s cubic-bezier(.22,1,.36,1)}
.modal-header{padding:24px 28px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.modal-title{font-family:var(--fo);font-size:20px;font-weight:700}
.modal-body{padding:24px 28px;overflow-y:auto;max-height:calc(80vh - 80px)}
.modal-footer{padding:18px 28px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;flex-direction:row-reverse}
[dir="ltr"] .modal-footer{flex-direction:row}
.modal-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--t1);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .18s;flex-shrink:0}
.modal-close:hover{background:rgba(255,255,255,.18)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-full{grid-column:1/-1}
.form-group{margin-bottom:0}

/* ═══════════ TMDB SEARCH ═══════════ */
.tmdb-results{border:1px solid rgba(255,255,255,.1);border-radius:var(--r12);overflow:hidden;margin-top:8px;max-height:280px;overflow-y:auto;background:var(--bg2)}
.tmdb-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.05)}
.tmdb-item:last-child{border-bottom:none}
.tmdb-item:hover{background:rgba(79,143,255,.1)}
.tmdb-poster{width:36px;height:54px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.07)}

/* ═══════════ ANIMATIONS ═══════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.au{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
.ai{animation:fadeIn .3s both}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--r);animation:pulse 1.8s infinite;flex-shrink:0}

/* ═══════════ MISC ═══════════ */
.divider{height:1px;background:rgba(255,255,255,.07);margin:16px 0}
.loading-center{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--t3);gap:10px}
.spinner{width:20px;height:20px;border:2px solid rgba(79,143,255,.2);border-top-color:var(--a);border-radius:50%;animation:spin .75s linear infinite;flex-shrink:0}
.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-icon{font-size:44px;margin-bottom:14px}
.poster-preview{width:60px;height:88px;border-radius:9px;object-fit:cover;border:1px solid rgba(255,255,255,.12)}
.backdrop-preview{width:120px;height:68px;border-radius:8px;object-fit:cover;border:1px solid rgba(255,255,255,.12)}
.info-box{background:rgba(79,143,255,.07);border:1px solid rgba(79,143,255,.18);border-radius:var(--r12);padding:12px 16px;font-size:13px;color:var(--t2);display:flex;gap:10px;align-items:flex-start}

/* ═══════════ TOAST ═══════════ */
#toasts{position:fixed;top:74px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:rgba(20,20,40,.96);border:1px solid rgba(255,255,255,.12);color:#fff;padding:11px 22px;border-radius:20px;font-size:13.5px;backdrop-filter:blur(20px);animation:slideUp .3s both;pointer-events:all;max-width:400px;text-align:center;display:flex;align-items:center;gap:8px}
.toast.s{border-color:rgba(74,222,128,.35);background:rgba(5,30,15,.95)}
.toast.e{border-color:rgba(255,95,109,.35);background:rgba(30,5,10,.95)}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px)}}

/* ═══════════ AMBIENCE ═══════════ */
.orb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0}

/* ═══════════ ORBS ═══════════ */
.orb1{width:600px;height:600px;background:#1A3A8F;top:-200px;left:-100px;opacity:.15;animation:orbF 16s ease-in-out infinite}
.orb2{width:500px;height:500px;background:#2A1A3A;bottom:-150px;right:-80px;opacity:.13;animation:orbF2 20s ease-in-out infinite}
@keyframes orbF{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-20px)}}
@keyframes orbF2{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,15px)}}

/* ═══════════ LOGIN ═══════════ */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.login-card{border-radius:var(--r24);padding:44px 40px;width:100%;max-width:420px;animation:slideUp .5s cubic-bezier(.22,1,.36,1) both}

/* ═══════════ RESPONSIVE ═══════════ */
@media(max-width:1024px){
  :root{--sb:64px}
  .sb-logo-text,.sb-item-label,.sb-badge,.sb-section{display:none}
  .sb-logo{justify-content:center;padding:16px 8px}
  .sb-item{justify-content:center;padding:12px;margin:2px 6px}
  .sb-item-icon{width:auto;font-size:20px}
  #content{padding:20px 16px}
  .form-grid{grid-template-columns:1fr}
}
@media(max-width:700px){
  :root{--sb:0px;--top:56px}
  #sidebar{display:none}
  #main{margin:0!important}
  .stats-grid{grid-template-columns:1fr 1fr}
  #topbar{padding:0 16px}
  #content{padding:16px 12px}
  .modal{max-width:100%;margin:0}
  .modal-body{max-height:70vh}
  .tbl-wrap{overflow-x:auto}
  table{min-width:600px}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<!-- ORBS -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card gl2" style="position:relative;z-index:1">
    <div style="text-align:center;margin-bottom:32px">
      <div style="width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;box-shadow:0 8px 24px rgba(79,143,255,.4)">▶</div>
      <h1 style="font-family:var(--fo);font-size:26px;font-weight:700">SHAHID<span style="color:var(--a)">365</span></h1>
      <p style="color:var(--t3);font-size:13px;margin-top:5px">لوحة التحكم الإدارية</p>
    </div>
    <div style="margin-bottom:14px">
      <label class="inp-label">اسم المستخدم</label>
      <input class="inp" id="l-user" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div style="margin-bottom:22px">
      <label class="inp-label">كلمة المرور</label>
      <input class="inp" id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div id="l-err" style="display:none;background:rgba(255,95,109,.1);border:1px solid rgba(255,95,109,.28);border-radius:10px;padding:10px;color:var(--r);font-size:13px;text-align:center;margin-bottom:14px"></div>
    <button class="btn bp" style="width:100%;padding:13px;font-size:15px" id="l-btn" onclick="doLogin()">دخول →</button>
  </div>
</div>

<!-- APP WRAP -->
<div id="app-wrap" style="display:none">
  <!-- SIDEBAR -->
  <nav id="sidebar" class="gl">
    <div class="sb-logo">
      <div class="sb-logo-icon">▶</div>
      <div class="sb-logo-text">SHAHID<span style="color:var(--a)">365</span></div>
    </div>
    <div class="sb-section">المحتوى</div>
    <div class="sb-item active" data-p="dashboard" onclick="nav('dashboard')">
      <span class="sb-item-icon">📊</span><span class="sb-item-label">الرئيسية</span>
    </div>
    <div class="sb-item" data-p="movies" onclick="nav('movies')">
      <span class="sb-item-icon">🎬</span><span class="sb-item-label">الأفلام</span>
    </div>
    <div class="sb-item" data-p="series" onclick="nav('series')">
      <span class="sb-item-icon">📺</span><span class="sb-item-label">المسلسلات</span>
    </div>
    <div class="sb-item" data-p="persons" onclick="nav('persons')">
      <span class="sb-item-icon">🎭</span><span class="sb-item-label">الممثلون</span>
    </div>
    <div class="sb-item" data-p="channels" onclick="nav('channels')">
      <span class="sb-item-icon">📡</span><span class="sb-item-label">البث المباشر</span>
    </div>
    <div class="sb-section">التسييل</div>
    <div class="sb-item" data-p="ads" onclick="nav('ads')">
      <span class="sb-item-icon">📢</span><span class="sb-item-label">الإعلانات</span>
    </div>
    <div class="sb-item" data-p="subs" onclick="nav('subs')">
      <span class="sb-item-icon">🔑</span><span class="sb-item-label">الاشتراكات</span>

function toggleAdminLang() {
  S.lang = S.lang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('s365_admin_lang', S.lang);
  document.documentElement.lang = S.lang;
  document.documentElement.dir  = S.lang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('lang-btn').textContent = S.lang === 'ar' ? 'EN' : 'عربي';
  nav(S.page);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  API
// ═══════════════════════════════════════════════════════════════════════════════
const API = {
  async req(method, ep, data) {
    const opts = { method, headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + S.token } };
    if (data) opts.body = JSON.stringify(data);
    const res = await fetch(API_BASE + ep, opts);
    const json = await res.json().catch(() => ({}));
    if (res.status === 401) { logout(); throw new Error('Session expired'); }
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    return json;
  },
  get:    ep     => API.req('GET',    ep),
  post:   (ep,d) => API.req('POST',   ep, d),
  put:    (ep,d) => API.req('PUT',    ep, d),
  patch:  (ep,d) => API.req('PATCH',  ep, d),
  delete: ep     => API.req('DELETE', ep),
};

// ═══════════════════════════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════════════════════════
async function doLogin() {
  const user = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;
  const btn  = document.getElementById('l-btn');
  const err  = document.getElementById('l-err');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = '…';
  try {
    const { token } = await fetch(API_BASE + '/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass }),
    }).then(async r => { const j = await r.json(); if (!r.ok) throw new Error(j.error); return j; });
    S.token = token;
    localStorage.setItem('s365_admin_token', token);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'flex';
    document.documentElement.lang = S.lang;
    document.documentElement.dir  = S.lang === 'ar' ? 'rtl' : 'ltr';
    document.getElementById('lang-btn').textContent = S.lang === 'ar' ? 'EN' : 'عربي';
    await loadSettings();
    nav('dashboard');
  } catch (e) {
    err.textContent = e.message; err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'دخول →';
}

function logout() {
  S.token = '';
  localStorage.removeItem('s365_admin_token');
  location.reload();
}

async function loadSettings() {
  try { S.settings = await API.get('/api/settings'); } catch {}
}

// Check existing token
window.addEventListener('DOMContentLoaded', async () => {
  if (S.token) {
    try {
      await API.get('/api/stats');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-wrap').style.display = 'flex';
      document.documentElement.lang = S.lang;
      document.documentElement.dir  = S.lang === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('lang-btn').textContent = S.lang === 'ar' ? 'EN' : 'عربي';
      await loadSettings();
      nav('dashboard');
    } catch { S.token = ''; localStorage.removeItem('s365_admin_token'); }
  }
  document.getElementById('l-user').focus();
});

// ═══════════════════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════════
const PAGE_TITLES = {
  dashboard:'الرئيسية',movies:'الأفلام',series:'المسلسلات',persons:'الممثلون',
  channels:'البث المباشر',ads:'الإعلانات',subs:'الاشتراكات',settings:'الإعدادات',
};
function nav(page) {
  S.page = page;
  document.querySelectorAll('.sb-item[data-p]').forEach(el => el.classList.toggle('active', el.dataset.p === page));
  document.getElementById('top-title').textContent = t(page);
  const map = { dashboard:renderDashboard, movies:()=>renderContent('movie'), series:()=>renderContent('series'),
    persons:renderPersons, channels:renderChannels, ads:renderAds, subs:renderSubs, settings:renderSettings };
  if (map[page]) map[page]();
}

function globalSearch(q) {
  clearTimeout(S._searchTimer);
  if (!q.trim()) return;
  S._searchTimer = setTimeout(() => {
    renderContent(null, q);
    S.page = 'movies';
    document.querySelectorAll('.sb-item[data-p]').forEach(el => el.classList.toggle('active', el.dataset.p === 'movies'));
    document.getElementById('top-title').textContent = `🔍 "${q}"`;
  }, 400);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
const el = id => document.getElementById(id);
const fmtNum = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : String(n||0);
const ctr   = ad => ad.impr ? ((ad.clicks/ad.impr)*100).toFixed(1)+'%' : '0%';
const escHtml = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';

function toast(msg, type = '') {
  const c = el('toasts');
  const d = document.createElement('div');
  d.className = 'toast ' + (type === 'success' ? 's' : type === 'error' ? 'e' : '');
  d.innerHTML = `<span>${type==='success'?'✓ ':type==='error'?'✕ ':''}</span>${escHtml(msg)}`;
  c.appendChild(d);
  setTimeout(() => { d.style.animation = 'toastOut .3s both'; setTimeout(() => d.remove(), 300); }, 3500);
}

function loading(id) { el(id).innerHTML = `<div class="loading-center"><div class="spinner"></div></div>`; }

// ═══════════════════════════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════════════════════════
function openModal(title, bodyHTML, footerHTML = '') {
  el('modal-title').textContent = title;
  el('modal-body').innerHTML    = bodyHTML;
  el('modal-footer').innerHTML  = footerHTML;
  el('modal-bg').classList.add('open');
}
function closeModal() { el('modal-bg').classList.remove('open'); }

      <div class="tbl-wrap">

          ${(stats.topContent||[]).map(m => `
            <tr>

  try {
    let qs = `?limit=50&sort=-createdAt`;
    if (type) qs += `&type=${type}`;
    if (q)    qs += `&q=${encodeURIComponent(q)}`;
    const data   = await API.get(`/api/movies${qs}`);
    const items  = data.items || [];
    const isType = type || 'movie';

    c.innerHTML = `<div class="au">
      <div class="page-actions">
        <div class="page-title" style="margin-bottom:0">
          <div class="sec-bar"></div>
          ${type==='series'?t('series'):t('movies')} <span style="font-size:14px;color:var(--t3);font-family:var(--f)">(${data.total})</span>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <div style="position:relative">
            <span style="position:absolute;top:50%;transform:translateY(-50%);right:12px;opacity:.4;font-size:12px">🔍</span>
            <input class="inp" style="padding:9px 34px 9px 14px;width:200px;border-radius:22px;font-size:13px"
              placeholder="${t('search')}" value="${escHtml(q)}" onkeydown="if(event.key==='Enter')renderContent('${type}',this.value)"
              oninput="clearTimeout(this._t);this._t=setTimeout(()=>renderContent('${type}',this.value),400)"/>

          <button class="btn bp" onclick="openAddMovie('${type||'movie'}')">+ ${t('add')}</button>
        </div>
      </div>

      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th></th><th>${t('title')}</th><th>${t('year')}</th>
            <th>${t('rating')}</th><th>${t('views')}</th>
            <th>${t('featured')}</th><th>${t('active')}</th><th></th>
          </tr></thead>
          <tbody>
          ${items.length ? items.map(m => `
            <tr>
              <td><img src="${escHtml(m.poster||'')}" style="width:36px;height:52px;border-radius:7px;object-fit:cover"
                onerror="this.src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 36 52&quot;><rect width=&quot;36&quot; height=&quot;52&quot; fill=&quot;%23222&quot;/></svg>'" alt=""/></td>
              <td>
                <div style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(m.titleAr||m.title||'—')}</div>
                <div style="font-size:11.5px;color:var(--t3)">${escHtml(m.title||'')}</div>
              </td>
              <td style="color:var(--t2)">${m.year||'—'}</td>
              <td><span style="color:var(--go);font-weight:700">★ ${m.rating||'—'}</span></td>
              <td style="color:var(--t2)">${fmtNum(m.views)}</td>
              <td><span class="badge ${m.featured?'bg2':'br2'}">${m.featured?'✓':'✗'}</span></td>
              <td><div class="tgl ${m.featured?'on':''}" onclick="toggleFeatured('${m._id}',${!m.featured},this)"></div></td>
              <td>
                <div style="display:flex;gap:6px">
                  <button class="btn bs btn-xs" onclick="openEditMovie('${m._id}')">✎ ${t('edit')}</button>

async function toggleFeatured(id, val, tglEl) {
  try {
    await API.put(`/api/movies/${id}`, { featured: val });
    tglEl.classList.toggle('on', val);
    toast(t('save') + ' ✓', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

async function delMovie(id) {
  if (!confirm('هل تريد الحذف؟')) return;
  try { await API.delete(`/api/movies/${id}`); toast(t('del') + ' ✓', 'success'); nav(S.page); }
  catch (e) { toast(e.message, 'error'); }
}

  const cast = (m.cast||[]).map((c,i) => {
    const p = c.person || {};

function addCastRow() {
  const cont = el('cast-container');
  const div  = document.createElement('div');
  div.className = 'cast-entry';
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;animation:fadeIn .2s both';
  div.innerHTML = `
    <input class="inp" style="flex:1" placeholder="${t('name')}"/>
    <input class="inp" style="flex:1" placeholder="${t('nameAr')}"/>
    <input class="inp" style="width:110px" placeholder="${t('role')}"/>
    <input class="inp" style="width:80px" placeholder="Photo URL"/>
    <button class="btn br btn-xs" onclick="this.closest('.cast-entry').remove()" type="button">✕</button>`;
  cont.appendChild(div);
}

function previewImg(inputId, imgId) {
  const src = el(inputId)?.value?.trim();
  const img = el(imgId);
  if (!img) return;
  if (src) { img.src = src; img.style.display = ''; }
  else img.style.display = 'none';
}

function collectMovieForm(isEdit = false) {
  const castEntries = document.querySelectorAll('.cast-entry');
  const cast = [...castEntries].map(row => {
    const inputs = row.querySelectorAll('input');
    return { name: inputs[0].value.trim(), nameAr: inputs[1].value.trim(), role: inputs[2].value.trim(), photo: inputs[3].value.trim() };
  }).filter(c => c.name || c.nameAr);

  return {
    title:      el('f-title')?.value?.trim()     || '',
    titleAr:    el('f-titleAr')?.value?.trim()   || '',
    origTitle:  el('f-origTitle')?.value?.trim() || '',
    desc:       el('f-desc')?.value?.trim()      || '',
    descAr:     el('f-descAr')?.value?.trim()    || '',
    poster:     el('f-poster')?.value?.trim()    || '',
    backdrop:   el('f-backdrop')?.value?.trim()  || '',
    year:       +el('f-year')?.value             || null,
    duration:   +el('f-duration')?.value         || null,
    rating:     +el('f-rating')?.value           || null,
    lang:       el('f-lang')?.value              || 'ar',
    type:       el('f-type')?.value              || 'movie',
    genres:     (el('f-genres')?.value||'').split(',').map(s=>s.trim()).filter(Boolean),
    genresAr:   (el('f-genresAr')?.value||'').split(',').map(s=>s.trim()).filter(Boolean),
    videoUrl:   el('f-videoUrl')?.value?.trim()   || undefined,
    dlUrl:      el('f-dlUrl')?.value?.trim()      || undefined,
    trailerUrl: el('f-trailerUrl')?.value?.trim() || undefined,
    featured:   el('f-featured-tgl')?.classList.contains('on') || false,
    _directorName: el('f-director-name')?.value?.trim() || '',
    _cast:      cast,
  };
}

function openAddMovie(type = 'movie') {
  const isMovie = type === 'movie';
  openModal(
    `+ ${t('add')} ${isMovie?t('movie'):t('seriesW')}`,
    movieFormHTML({}, type),
    `<button class="btn bp" onclick="saveMovie(null,'${type}')">💾 ${t('save')}</button>
     <button class="btn bs" onclick="closeModal()">${t('cancel')}</button>`
  );
}

async function openEditMovie(id) {
  openModal(t('edit'), `<div class="loading-center"><div class="spinner"></div></div>`, '');
  try {
    const m = await API.get(`/api/movies/${id}`);
    el('modal-body').innerHTML = movieFormHTML(m, m.type);
    el('modal-footer').innerHTML = `
      <button class="btn bp" onclick="saveMovie('${id}','${m.type}')">💾 ${t('save')}</button>
      <button class="btn bs" onclick="closeModal()">${t('cancel')}</button>`;
  } catch(e) { toast(e.message,'error'); closeModal(); }
}

async function saveMovie(id, type) {
  const data = collectMovieForm(!!id);
  if (!data.titleAr && !data.title) { toast('العنوان مطلوب','error'); return; }

  const btn = el('modal-footer')?.querySelector('.bp');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  try {
    // Handle cast: create persons if new
    const castRefs = [];
    for (const c of data._cast) {
      if (!c.name && !c.nameAr) continue;
      let person;
      try {
        person = await API.post('/api/persons', { name: c.name, nameAr: c.nameAr, photo: c.photo });
      } catch { person = { _id: null }; }
      if (person._id) castRefs.push({ person: person._id, role: c.role });
    }

    // Handle director
    let directorId = null;
    const dirName = data._directorName;
    if (dirName) {
      try {
        const p = await API.post('/api/persons', { name: dirName });
        directorId = p._id;
      } catch {}
    }

    const payload = { ...data, cast: castRefs, director: directorId || undefined };
    delete payload._cast; delete payload._directorName;

    if (id) { await API.put(`/api/movies/${id}`, payload); toast(t('save')+' ✓','success'); }
    else     { await API.post('/api/movies', payload);      toast(t('add')+' ✓','success'); }
    closeModal();
    nav(S.page);
  } catch (e) { toast(e.message,'error'); if(btn){btn.disabled=false;btn.textContent='💾 '+t('save');} }
}

async function searchTMDB(type) {
  const q   = el('tmdb-q')?.value?.trim();
  const lng = el('tmdb-lang-sel')?.value || 'ar';
  S.tmdbLang = lng;
  if (!q) return;
  el('tmdb-results').innerHTML = `<div style="padding:10px;color:var(--t3);font-size:13px;display:flex;align-items:center;gap:8px"><div class="spinner"></div> جارٍ البحث…</div>`;
  try {
    const results = await API.get(`/api/tmdb/search?q=${encodeURIComponent(q)}&lang=${lng}`);
    if (!results.length) { el('tmdb-results').innerHTML = `<div style="padding:12px;color:var(--t3);font-size:13px">لا توجد نتائج</div>`; return; }
    el('tmdb-results').innerHTML = `<div class="tmdb-results">
      ${results.map(r => `
      <div class="tmdb-item" onclick="fetchTMDBDetails(${r.tmdbId},'${r.mediaType||type}','${lng}')">
        ${r.poster?`<img class="tmdb-poster" src="${r.poster}" loading="lazy" onerror="this.remove()">`:`<div class="tmdb-poster" style="display:flex;align-items:center;justify-content:center;font-size:24px">🎬</div>`}
        <div>
          <div style="font-weight:600;font-size:13.5px">${escHtml(r.title||'')}</div>
          <div style="font-size:12px;color:var(--t3);margin-top:2px">${r.year||''} ${r.rating?'• ★'+r.rating:''}</div>
        </div>
      </div>`).join('')}
    </div>`;
  } catch (e) { el('tmdb-results').innerHTML = `<div style="padding:10px;color:var(--r);font-size:13px">${e.message}</div>`; }
}

async function fetchTMDBDetails(tmdbId, mediaType, lang) {
  el('tmdb-results').innerHTML = `<div style="padding:10px;color:var(--t3);font-size:13px;display:flex;align-items:center;gap:8px"><div class="spinner"></div> جارٍ جلب التفاصيل…</div>`;
  try {
    const d = await API.get(`/api/tmdb/details/${tmdbId}?mediaType=${mediaType}&lang=${lang}`);
    // Fill the form fields
    if (el('f-title'))     el('f-title').value     = d.title||'';
    if (el('f-origTitle')) el('f-origTitle').value = d.origTitle||'';
    if (el('f-year'))      el('f-year').value      = d.year||'';
    if (el('f-rating'))    el('f-rating').value    = d.rating||'';
    if (el('f-duration'))  el('f-duration').value  = d.duration||'';
    if (el('f-lang'))      el('f-lang').value      = d.lang||'ar';
    if (el('f-poster')) {
      el('f-poster').value = d.poster||'';
      previewImg('f-poster','poster-prev');
    }
    if (el('f-backdrop')) {
      el('f-backdrop').value = d.backdrop||'';
      previewImg('f-backdrop','backdrop-prev');
    }
    if (el('f-trailerUrl')) el('f-trailerUrl').value = d.trailerUrl||'';
    // Genres
    if (lang === 'ar') {
      if (el('f-genresAr')) el('f-genresAr').value = (d.genres||[]).join(', ');
    } else {
      if (el('f-genres'))   el('f-genres').value   = (d.genres||[]).join(', ');
    }
    // Desc
    if (lang === 'ar') {
      if (el('f-descAr'))  el('f-descAr').value  = d.desc||'';
    } else {
      if (el('f-desc'))    el('f-desc').value    = d.desc||'';
    }
    // Director
    if (d.directorName && el('f-director-name')) el('f-director-name').value = d.directorName;
    // Cast
    const cont = el('cast-container');
    if (cont) {
      cont.innerHTML = '';
      (d.cast||[]).forEach(c => {
        const row = document.createElement('div');
        row.className = 'cast-entry';
        row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
        row.innerHTML = `
          <input class="inp" style="flex:1" placeholder="${t('name')}" value="${escHtml(c.name||'')}"/>
          <input class="inp" style="flex:1" placeholder="${t('nameAr')}" value=""/>
          <input class="inp" style="width:110px" placeholder="${t('role')}" value="${escHtml(c.role||'')}"/>
          <input class="inp" style="width:80px" placeholder="Photo URL" value="${escHtml(c.photo||'')}"/>
          <button class="btn br btn-xs" onclick="this.closest('.cast-entry').remove()" type="button">✕</button>`;
        cont.appendChild(row);
      });
    }
    el('tmdb-results').innerHTML = `<div style="padding:10px 12px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:9px;color:var(--gr);font-size:13px">✓ تم جلب البيانات. يمكنك تعديل أي حقل قبل الحفظ.</div>`;
  } catch (e) { el('tmdb-results').innerHTML = `<div style="padding:10px;color:var(--r);font-size:13px">${e.message}</div>`; }
}

async function openSeasons(movieId, movieTitle) {
  openModal(`📋 ${movieTitle}`, `<div class="loading-center"><div class="spinner"></div></div>`, '');
  try {
    await renderSeasonsModal(movieId);
  } catch (e) { toast(e.message,'error'); }
}

async function renderSeasonsModal(movieId) {
  const seasons = await API.get(`/api/movies/${movieId}/seasons`);
  el('modal-title').textContent = `📋 ${t('season')}`;
  el('modal-footer').innerHTML = `<button class="btn bp" onclick="openAddSeasonModal('${movieId}')">+ ${t('addSeason')}</button>`;
  el('modal-body').innerHTML = seasons.length
    ? seasons.map(s => `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-weight:700">${t('season')} ${s.n} — ${escHtml(s.titleAr||s.title||'')}</div>
          <div style="font-size:12px;color:var(--t3)">${s.epCount||0} ${t('episode')}</div>
        </div>
        <div style="display:flex;gap:7px">
          <button class="btn bgo btn-xs" onclick="openEpisodes('${s._id}','${s.n}')">📋 ${t('episode')}</button>
          <button class="btn bs btn-xs" onclick="openEditSeason('${s._id}')">✎</button>
          <button class="btn br btn-xs" onclick="delSeason('${s._id}','${movieId}')">✕</button>
        </div>
      </div>
    </div>`).join('')
    : `<div class="empty-state" style="padding:30px"><div class="empty-icon">📺</div><div>${t('noData')}</div></div>`;
}

function openAddSeasonModal(movieId) {
  closeModal();
  setTimeout(() => {
    openModal(`+ ${t('addSeason')}`,
    `<div class="form-grid">
      <div><label class="inp-label">${t('seasonNum')} *</label><input class="inp" id="s-n" type="number" min="1" placeholder="1"/></div>
      <div><label class="inp-label">${t('titleAr')}</label><input class="inp" id="s-titleAr" placeholder="الموسم الأول"/></div>
      <div class="form-full"><label class="inp-label">${t('titleEn')}</label><input class="inp" id="s-title" placeholder="Season 1"/></div>
    </div>`,
    `<button class="btn bp" onclick="saveSeason(null,'${movieId}')">💾 ${t('save')}</button>
     <button class="btn bs" onclick="openSeasons('${movieId}','')">← ${t('cancel')}</button>`);
  }, 50);
}

async function saveSeason(id, movieId) {
  const data = { n: +el('s-n')?.value||1, titleAr: el('s-titleAr')?.value?.trim(), title: el('s-title')?.value?.trim() };
  try {
    if (id) await API.put(`/api/seasons/${id}`, data);
    else    await API.post(`/api/movies/${movieId}/seasons`, data);
    toast(t('save')+' ✓','success');
    closeModal();
    setTimeout(()=>openSeasons(movieId,''),50);
  } catch (e) { toast(e.message,'error'); }
}

async function delSeason(seasonId, movieId) {
  if (!confirm('حذف الموسم وجميع حلقاته؟')) return;
  try { await API.delete(`/api/seasons/${seasonId}`); toast(t('del')+' ✓','success'); openSeasons(movieId,''); }
  catch (e) { toast(e.message,'error'); }
}

async function openEpisodes(seasonId, seasonN) {
  const eps = await API.get(`/api/seasons/${seasonId}/episodes`);
  el('modal-title').textContent = `${t('episode')} — ${t('season')} ${seasonN}`;
  el('modal-footer').innerHTML = `<button class="btn bp" onclick="openAddEpisode('${seasonId}')">+ ${t('addEp')}</button>`;
  el('modal-body').innerHTML = eps.length
    ? `<div style="display:flex;flex-direction:column;gap:9px">
      ${eps.map(ep => `
      <div class="card" style="display:flex;align-items:center;gap:12px">
        ${ep.thumb?`<img src="${escHtml(ep.thumb)}" style="width:72px;height:42px;border-radius:7px;object-fit:cover;flex-shrink:0">`:`<div style="width:72px;height:42px;border-radius:7px;background:rgba(255,255,255,.07);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px">▶</div>`}
        <div style="flex:1;overflow:hidden">
          <div style="font-weight:600">${t('episode')} ${ep.n} — ${escHtml(ep.titleAr||ep.title||'')}</div>
          <div style="font-size:12px;color:var(--t3)">${ep.duration?ep.duration+' min':''} ${ep.releaseDate?'• '+new Date(ep.releaseDate).toLocaleDateString('ar'):''}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn bs btn-xs" onclick="openEditEpisode('${ep._id}','${seasonId}','${seasonN}')">✎</button>
          <button class="btn br btn-xs" onclick="delEpisode('${ep._id}','${seasonId}','${seasonN}')">✕</button>
        </div>

      {id:'a-delay',   label:'تأخير الظهور (ms)',  val:ad.delayMs||3000, min:0,  max:10000, step:500,  suf:'ms'},
      {id:'a-skip',    label:'تخطي بعد (ثانية)',   val:ad.skipAfter||5,  min:0,  max:30,    step:1,    suf:'s'},
      {id:'a-auto',    label:'إخفاء تلقائي (0=ثابت)',val:ad.bannerSecs||8,min:0,  max:60,    step:1,    suf:'s'},
      {id:'a-every',   label:'ظهور كل N صفحة',     val:ad.everyN||4,     min:1,  max:10,    step:1,    suf:''},
      {id:'a-maxsess', label:'حد الجلسة الواحدة',   val:ad.maxPerSess||2, min:1,  max:10,    step:1,    suf:''},
    ].map(f=>`
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:12px;color:var(--t3)">${f.label}</span>
        <span id="${f.id}-val" style="font-size:13px;font-weight:700;color:var(--go)">${f.val}${f.suf}</span>
      </div>
      <input type="range" class="range" id="${f.id}" min="${f.min}" max="${f.max}" step="${f.step}" value="${f.val}"
        oninput="el('${f.id}-val').textContent=this.value+'${f.suf}'"/>
    </div>`).join('')}
  </div>`;
}

function openAddAd() {
  openModal(`+ ${t('add')} ${t('ads')}`, adFormHTML(),
    `<button class="btn bp" onclick="saveAd(null)">💾 ${t('save')}</button>
     <button class="btn bs" onclick="closeModal()">${t('cancel')}</button>`);
}

async function openEditAd(id) {
  openModal(t('edit'), `<div class="loading-center"><div class="spinner"></div></div>`, '');
  try {
    const ads = await API.get('/api/ads?admin=1');
    const ad  = ads.find(a=>a._id===id)||{};
    el('modal-body').innerHTML   = adFormHTML(ad);
    el('modal-footer').innerHTML = `<button class="btn bp" onclick="saveAd('${id}')">💾 ${t('save')}</button>
      <button class="btn bs" onclick="closeModal()">${t('cancel')}</button>`;
  } catch (e) { toast(e.message,'error'); closeModal(); }
}

async function saveAd(id) {
  const data = {
    title:      el('a-title')?.value?.trim(),
    adType:     el('a-type')?.value,
    position:   el('a-pos')?.value,
    imageUrl:   el('a-img')?.value?.trim(),
    linkUrl:    el('a-link')?.value?.trim(),
    delayMs:    +el('a-delay')?.value,
    skipAfter:  +el('a-skip')?.value,
    bannerSecs: +el('a-auto')?.value,
    everyN:     +el('a-every')?.value,
    maxPerSess: +el('a-maxsess')?.value,
    active:     true,
  };
  if (!data.title || !data.linkUrl) { toast('العنوان والرابط مطلوبان','error'); return; }
  try {
    if (id) await API.put(`/api/ads/${id}`, data);
    else    await API.post('/api/ads', data);
    toast(t('save')+' ✓','success'); closeModal(); renderAds();
  } catch (e) { toast(e.message,'error'); }
}

async function toggleAd(id, val, tglEl) {
  try { await API.put(`/api/ads/${id}`, {active:val}); tglEl.classList.toggle('on',val); toast(t('save')+' ✓','success'); }
  catch (e) { toast(e.message,'error'); }
}

async function delAd(id) {
  if (!confirm('حذف؟')) return;
  try { await API.delete(`/api/ads/${id}`); toast(t('del')+' ✓','success'); renderAds(); }
  catch (e) { toast(e.message,'error'); }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SUBSCRIPTIONS
// ═══════════════════════════════════════════════════════════════════════════════
async function renderSubs() {
  const c = el('content');
  loading('content');
  try {
    const subs = await API.get('/api/subscriptions');
    c.innerHTML = `<div class="au">
      <div class="page-actions">
        <div class="page-title" style="margin-bottom:0"><div class="sec-bar"></div>${t('subs')} (${subs.length})</div>
        <button class="btn bp" onclick="openAddSub()">+ ${t('genCode')}</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:11px">
        ${subs.length ? subs.map(s=>`
        <div class="card" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <div style="flex:1;min-width:220px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
              <code style="font-size:17px;font-weight:900;letter-spacing:2.5px;color:var(--a);font-family:monospace">${escHtml(s.code||'')}</code>
              <span class="badge ${s.active?'bg2':'br2'}">${s.active?t('active'):'Off'}</span>
            </div>
            <div style="font-size:12.5px;color:var(--t2)">${escHtml(s.label||'بدون تسمية')}</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,80px);gap:10px;text-align:center">
            ${[['أجهزة',`${(s.devices||[]).length}/${s.maxDev}`,'var(--a)'],['انتهاء',s.expiresAt?new Date(s.expiresAt).toLocaleDateString('ar'):'∞','var(--go)'],['تاريخ',s.createdAt?new Date(s.createdAt).toLocaleDateString('ar'):'—','var(--t3)']].map(([l,v,col])=>`
            <div><div style="font-size:10.5px;color:var(--t3)">${l}</div><div style="font-size:12.5px;font-weight:700;color:${col}">${v}</div></div>`).join('')}
          </div>
          <div style="display:flex;gap:7px;align-items:center">
            <div class="tgl ${s.active?'on':''}" onclick="toggleSub('${s._id}',${!s.active},this)"></div>
            <button class="btn bpu btn-xs" onclick="viewSubDevices('${s._id}')">📱</button>
            <button class="btn br btn-xs" onclick="delSub('${s._id}')">✕</button>
          </div>
        </div>`).join('')
        : `<div class="empty-state"><div class="empty-icon">🔑</div><div>${t('noData')}</div></div>`}
      </div>
    </div>`;
  } catch (e) { c.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div>${e.message}</div></div>`; }
}

function openAddSub() {
  openModal(`🔑 ${t('genCode')}`,
  `<div class="form-grid">
    <div class="form-full"><label class="inp-label">${t('subLabel')}</label><input class="inp" id="sub-label" placeholder="مثال: عائلة أحمد"/></div>
    <div><label class="inp-label">${t('subMaxDev')}</label><input class="inp" id="sub-maxdev" type="number" min="1" max="50" value="1"/></div>
    <div><label class="inp-label">${t('subExpiry')}</label><input class="inp" id="sub-exp" type="date"/></div>
  </div>
  <div class="info-box" style="margin-top:14px"><span>💡</span><span>الكود يُولَّد تلقائياً بصيغة SHAH-XXXX-YYYY. المستخدم يدخله في تطبيق المستخدم لتفعيل الاشتراك عبر بصمة الجهاز.</span></div>`,
  `<button class="btn bp" onclick="saveSub()">✓ ${t('genCode')}</button>
   <button class="btn bs" onclick="closeModal()">${t('cancel')}</button>`);
}

async function saveSub() {
  const data = { label:el('sub-label')?.value?.trim(), maxDev:+el('sub-maxdev')?.value||1, expiresAt:el('sub-exp')?.value||null };
  try { await API.post('/api/subscriptions', data); toast(t('genCode')+' ✓','success'); closeModal(); renderSubs(); }
  catch (e) { toast(e.message,'error'); }
}

async function toggleSub(id, val, tglEl) {
  try { await API.put(`/api/subscriptions/${id}`, {active:val}); tglEl.classList.toggle('on',val); toast(t('save')+' ✓','success'); }
  catch (e) { toast(e.message,'error'); }
}

async function delSub(id) {
  if (!confirm('حذف الاشتراك؟')) return;
  try { await API.delete(`/api/subscriptions/${id}`); toast(t('del')+' ✓','success'); renderSubs(); }
  catch (e) { toast(e.message,'error'); }
}

async function viewSubDevices(id) {
  openModal(t('subDevices'), `<div class="loading-center"><div class="spinner"></div></div>`, '');
  try {
    const subs = await API.get('/api/subscriptions');
    const s    = subs.find(x=>x._id===id)||{};
    el('modal-title').textContent = `📱 ${t('subDevices')} — ${s.code||''}`;
    const devices = s.devices||[];
    el('modal-body').innerHTML = devices.length
      ? devices.map((d,i)=>`
        <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:9px">
          <span style="font-size:26px">📱</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(d.ua||'Unknown UA')}</div>
            <div style="font-size:11.5px;color:var(--t3)">آخر ظهور: ${d.seen?new Date(d.seen).toLocaleDateString('ar'):'—'}</div>
          </div>
          <span style="font-size:11px;color:var(--t3);font-family:monospace">${escHtml((d.fp||'').slice(0,10))}…</span>
        </div>`).join('')
      : `<div class="empty-state" style="padding:30px"><div class="empty-icon">📱</div><div>لا يوجد أجهزة مسجلة</div></div>`;
    el('modal-footer').innerHTML = `<button class="btn bs" onclick="closeModal()">${t('cancel')}</button>`;
  } catch (e) { toast(e.message,'error'); }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════════════════════════════════
async function renderSettings() {
  const c = el('content');
  loading('content');
  try {
    const cfg = await API.get('/api/settings');
    S.settings = cfg;
    c.innerHTML = `<div class="au" style="max-width:700px">
      <div class="page-title"><div class="sec-bar"></div>${t('settings')}</div>

      <!-- Site Identity -->
      <div class="card" style="margin-bottom:16px">
        <div style="font-weight:700;font-size:14px;margin-bottom:14px">🌐 هوية الموقع</div>
        <div class="form-grid">
          <div><label class="inp-label">${t('siteTitleAr')}</label><input class="inp" id="cfg-titleAr" value="${escHtml(cfg.siteTitleAr||'شاهد 365')}"/></div>
          <div><label class="inp-label">${t('siteTitle')}</label><input class="inp" id="cfg-title" value="${escHtml(cfg.siteTitle||'Shahid365')}"/></div>
        </div>
      </div>

      <!-- Maintenance -->
      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div>
            <div style="font-weight:700;font-size:14px;margin-bottom:3px">🔧 ${t('maintenance')}</div>
            <div style="font-size:13px;color:var(--t3)">يوجّه جميع الزوار لصفحة الصيانة. الأدمن غير متأثر.</div>
          </div>
          <div class="tgl ${cfg.maintenance?.on?'on':''}" id="cfg-maint-tgl" onclick="this.classList.toggle('on')"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><label class="inp-label">${t('msg')}</label><textarea class="inp" id="cfg-maint-msg" rows="2">${escHtml(cfg.maintenance?.msg||'')}</textarea></div>
          <div><label class="inp-label">${t('msgAr')}</label><textarea class="inp" id="cfg-maint-msgAr" rows="2">${escHtml(cfg.maintenance?.msgAr||'')}</textarea></div>
        </div>
      </div>

      <!-- Subscription Gate -->
      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;font-size:14px;margin-bottom:3px">🔐 ${t('subReq')}</div>
            <div style="font-size:13px;color:var(--t3)">يطلب كود اشتراك وبصمة جهاز للوصول إلى المحتوى.</div>
          </div>
          <div class="tgl ${cfg.subRequired?'on':''}" id="cfg-sub-tgl" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>

      <!-- Ads Global -->
      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;font-size:14px;margin-bottom:3px">📢 ${t('adsEnabled')}</div>
            <div style="font-size:13px;color:var(--t3)">تشغيل أو إيقاف جميع الإعلانات على المنصة.</div>
          </div>
          <div class="tgl ${cfg.adsEnabled!==false?'on':''}" id="cfg-ads-tgl" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>

      <!-- API Keys -->
      <div class="card" style="margin-bottom:24px">
        <div style="font-weight:700;font-size:14px;margin-bottom:14px">🔑 مفاتيح API</div>
        <div><label class="inp-label">${t('tmdbKey')}</label>
          <input class="inp" id="cfg-tmdb" type="password" value="${escHtml(cfg.tmdbKey||'')}" placeholder="ey…"/>
        </div>
      </div>

      <button class="btn bp" style="padding:13px 36px;font-size:15px" id="cfg-save-btn" onclick="saveSettings()">💾 ${t('save')}</button>
    </div>`;
  } catch (e) { c.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div>${e.message}</div></div>`; }
}

async function saveSettings() {
  const btn = el('cfg-save-btn');
  btn.disabled = true; btn.textContent = '…';
  const data = {
    siteTitleAr: el('cfg-titleAr')?.value?.trim(),
    siteTitle:   el('cfg-title')?.value?.trim(),
    maintenance: {
      on:    el('cfg-maint-tgl')?.classList.contains('on'),
      msg:   el('cfg-maint-msg')?.value?.trim(),
      msgAr: el('cfg-maint-msgAr')?.value?.trim(),
    },
    subRequired: el('cfg-sub-tgl')?.classList.contains('on'),
    adsEnabled:  el('cfg-ads-tgl')?.classList.contains('on'),
    tmdbKey:     el('cfg-tmdb')?.value?.trim(),
  };
  try {
    await API.put('/api/settings', data);
    S.settings = data;
    toast(t('save')+' ✓','success');
  } catch (e) { toast(e.message,'error'); }
  btn.disabled = false; btn.textContent = '💾 ' + t('save');
}
</script>
