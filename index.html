<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shahid365 — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040411;--bg1:#07071C;--bg2:#0d0d20;--bg3:#111130;
  --gl:rgba(255,255,255,.042);--gb:rgba(255,255,255,.08);--gb2:rgba(255,255,255,.13);
  --a:#4F8FFF;--a2:#2D6FFF;--r:#FF5F6D;--go:#FFD166;--gr:#4ADE80;--pu:#9B7FFF;--cy:#22D3EE;
  --t1:#fff;--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.32);--t4:rgba(255,255,255,.14);
  --f:'Cairo',sans-serif;--fo:'Oswald',sans-serif;
  --sb:252px;--top:60px;
  --s4:4px;--s8:8px;--s12:12px;--s16:16px;--s20:20px;--s24:24px;--s32:32px;
}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--t1);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(79,143,255,.3);border-radius:4px}
img{display:block;max-width:100%}
/* GLASS */
.gl{background:var(--gl);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--gb)}
.gl2{background:rgba(255,255,255,.06);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid var(--gb2)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;border:none;transition:all .2s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;line-height:1;font-family:var(--f)}
.bp{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;box-shadow:0 4px 16px rgba(79,143,255,.28)}.bp:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,143,255,.45)}
.bs{background:rgba(255,255,255,.07);color:var(--t1);border:1px solid rgba(255,255,255,.12)}.bs:hover{background:rgba(255,255,255,.13)}
.br{background:rgba(255,95,109,.14);color:var(--r);border:1px solid rgba(255,95,109,.28)}.br:hover{background:rgba(255,95,109,.24)}
.bg{background:rgba(74,222,128,.12);color:var(--gr);border:1px solid rgba(74,222,128,.25)}.bg:hover{background:rgba(74,222,128,.22)}
.bgo{background:rgba(255,209,102,.1);color:var(--go);border:1px solid rgba(255,209,102,.25)}.bgo:hover{background:rgba(255,209,102,.18)}
.bpu{background:rgba(155,127,255,.12);color:var(--pu);border:1px solid rgba(155,127,255,.28)}.bpu:hover{background:rgba(155,127,255,.22)}
.bcy{background:rgba(34,211,238,.1);color:var(--cy);border:1px solid rgba(34,211,238,.28)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:9px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:7px}
.btn-icon{width:34px;height:34px;padding:0;border-radius:9px;flex-shrink:0}
.btn:disabled{opacity:.44;pointer-events:none}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700}
.bb{background:rgba(79,143,255,.18);color:var(--a);border:1px solid rgba(79,143,255,.28)}
.bg2{background:rgba(74,222,128,.14);color:var(--gr);border:1px solid rgba(74,222,128,.24)}
.br2{background:rgba(255,95,109,.18);color:var(--r);border:1px solid rgba(255,95,109,.28)}
.bgo2{background:rgba(255,209,102,.13);color:var(--go);border:1px solid rgba(255,209,102,.22)}
.bpu2{background:rgba(155,127,255,.12);color:var(--pu);border:1px solid rgba(155,127,255,.22)}
/* INPUTS */
.inp{width:100%;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.11);border-radius:12px;padding:11px 15px;color:var(--t1);font-size:13.5px;outline:none;transition:all .2s;resize:vertical;font-family:var(--f)}
.inp:focus{border-color:rgba(79,143,255,.5);background:rgba(255,255,255,.085);box-shadow:0 0 0 3px rgba(79,143,255,.1)}
.inp::placeholder{color:var(--t3)}
.inp-label{display:block;font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px}
.sel{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.11);border-radius:12px;padding:11px 15px;color:var(--t1);font-size:13.5px;outline:none;cursor:pointer;width:100%;-webkit-appearance:none;font-family:var(--f);transition:border-color .2s}
.sel:focus{border-color:rgba(79,143,255,.5)}
.sel option{background:#07071C;color:#fff}
/* TOGGLE */
.tgl{position:relative;width:46px;height:26px;background:rgba(255,255,255,.1);border-radius:999px;cursor:pointer;transition:background .28s;border:1px solid rgba(255,255,255,.13);flex-shrink:0}
.tgl.on{background:var(--a);border-color:var(--a)}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 5px rgba(0,0,0,.3)}
.tgl.on::after{transform:translateX(20px)}
/* RANGE */
.range{width:100%;-webkit-appearance:none;height:4px;border-radius:4px;background:rgba(255,255,255,.12);outline:none;cursor:pointer;accent-color:var(--a)}
/* LAYOUT */
#app-wrap{display:flex;min-height:100vh}
#sidebar{width:var(--sb);min-height:100vh;position:fixed;top:0;bottom:0;z-index:100;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;border-radius:0;border-top:none;border-bottom:none}
[dir="rtl"] #sidebar{right:0;border-left:1px solid rgba(255,255,255,.06);border-right:none}
[dir="ltr"] #sidebar{left:0;border-right:1px solid rgba(255,255,255,.06);border-left:none}
#sidebar::-webkit-scrollbar{display:none}
#main{flex:1;display:flex;flex-direction:column;min-height:100vh}
[dir="rtl"] #main{margin-right:var(--sb)}
[dir="ltr"] #main{margin-left:var(--sb)}
#topbar{height:var(--top);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(4,4,17,.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;flex-shrink:0}
#content{flex:1;padding:28px 32px;overflow-y:visible}
/* SIDEBAR ITEMS */
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-shrink:0}
.sb-icon-wrap{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 16px rgba(79,143,255,.4);flex-shrink:0}
.sb-title{font-family:var(--fo);font-size:17px;font-weight:700;letter-spacing:-.2px}
.sb-section{padding:5px 12px 3px;font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-top:6px}
.si{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:11px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--t2);transition:all .18s;margin:2px 10px;border:1px solid transparent;position:relative}
.si:hover{color:var(--t1);background:rgba(79,143,255,.07)}
.si.act{color:var(--a);background:rgba(79,143,255,.11);border-color:rgba(79,143,255,.18)}
.si-ic{font-size:17px;flex-shrink:0;width:20px;text-align:center}
.si-lb{flex:1}
.si-badge{background:rgba(255,95,109,.18);color:var(--r);border:1px solid rgba(255,95,109,.28);padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.sb-foot{padding:12px;margin-top:auto;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:14px;margin-bottom:28px}
.stat-card{border-radius:20px;padding:22px;transition:all .25s cubic-bezier(.34,1.56,.64,1);cursor:default}
.stat-card:hover{transform:translateY(-4px)}
/* TABLE */
.tbl-wrap{border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.07)}
.tbl-head{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.025);flex-wrap:wrap;gap:10px}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid rgba(255,255,255,.07)}
th{padding:11px 16px;text-align:right;font-size:10.5px;color:var(--t3);font-weight:700;letter-spacing:.7px;text-transform:uppercase;white-space:nowrap}
[dir="ltr"] th{text-align:left}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.035)}
tbody tr:last-child{border-bottom:none}
td{padding:12px 16px;font-size:13.5px;vertical-align:middle}
/* CARD */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px}
.card-hover:hover{background:rgba(255,255,255,.065);border-color:rgba(255,255,255,.12)}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);z-index:800;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--bg1);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:0;width:100%;max-width:720px;margin:auto;position:relative;animation:slideUp .28s cubic-bezier(.22,1,.36,1)}
.modal-lg{max-width:900px}
.m-head{padding:24px 28px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.m-title{font-family:var(--fo);font-size:20px;font-weight:700}
.m-body{padding:24px 28px;overflow-y:auto;max-height:calc(85vh - 80px)}
.m-foot{padding:18px 28px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
[dir="rtl"] .m-foot{flex-direction:row-reverse}
.m-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--t1);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .18s;flex-shrink:0}
.m-close:hover{background:rgba(255,255,255,.18)}
/* FORM GRID */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.f2{grid-column:1/-1}
.fg-g{display:flex;flex-direction:column;gap:16px}
/* TMDB */
.tmdb-res{border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;margin-top:8px;max-height:300px;overflow-y:auto;background:var(--bg2)}
.tmdb-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.05)}
.tmdb-item:last-child{border-bottom:none}
.tmdb-item:hover{background:rgba(79,143,255,.1)}
.tmdb-poster{width:36px;height:54px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.07)}
/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--t3);font-size:15px;gap:10px}
.spin{width:20px;height:20px;border:2px solid rgba(79,143,255,.2);border-top-color:var(--a);border-radius:50%;animation:spin .75s linear infinite;flex-shrink:0}
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-ic{font-size:44px;margin-bottom:14px}
/* MISC */
.divider{height:1px;background:rgba(255,255,255,.07);margin:16px 0}
.info-box{background:rgba(79,143,255,.07);border:1px solid rgba(79,143,255,.18);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--t2);display:flex;gap:10px;align-items:flex-start}
.warn-box{background:rgba(255,209,102,.07);border:1px solid rgba(255,209,102,.2);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--go);display:flex;gap:10px}
.danger-box{background:rgba(255,95,109,.07);border:1px solid rgba(255,95,109,.2);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--r);display:flex;gap:10px}
.poster-prev{width:60px;height:88px;border-radius:9px;object-fit:cover;border:1px solid rgba(255,255,255,.12)}
.backdrop-prev{width:120px;height:68px;border-radius:8px;object-fit:cover;border:1px solid rgba(255,255,255,.12)}
.poster-mini{width:36px;height:52px;border-radius:7px;object-fit:cover;background:rgba(255,255,255,.07)}
/* ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0}
/* TOASTS */
#toasts{position:fixed;top:74px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:rgba(20,20,40,.96);border:1px solid rgba(255,255,255,.12);color:#fff;padding:11px 22px;border-radius:20px;font-size:13.5px;backdrop-filter:blur(20px);animation:slideUp .3s both;pointer-events:all;max-width:400px;text-align:center;display:flex;align-items:center;gap:8px}
.toast.s{border-color:rgba(74,222,128,.35);background:rgba(5,30,15,.95)}
.toast.e{border-color:rgba(255,95,109,.35);background:rgba(30,5,10,.95)}
.toast.w{border-color:rgba(255,209,102,.35);background:rgba(30,25,5,.95)}
/* PROGRESS BAR */
.progress-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
/* SECTION TITLE */
.page-title{font-family:var(--fo);font-size:24px;font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:24px}
.sec-bar{width:4px;border-radius:999px;flex-shrink:0}
/* LIVE DOT */
.ld{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--r);animation:pd 1.8s infinite;flex-shrink:0}
/* TREND DRAG */
.trend-item{padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;display:flex;align-items:center;gap:12px;cursor:grab;user-select:none;transition:all .2s}
.trend-item:hover{background:rgba(79,143,255,.07);border-color:rgba(79,143,255,.2)}
.trend-item.dragging{opacity:.5;cursor:grabbing}
/* ANIMS */
@keyframes slideUp{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
.au{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
/* LOGIN SCREEN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
/* RESPONSIVE */
@media(max-width:1100px){
  :root{--sb:66px}
  .sb-title,.si-lb,.si-badge,.sb-section{display:none}
  .sb-logo{justify-content:center;padding:16px 8px}
  .si{justify-content:center;padding:12px;margin:2px 6px}
  .si-ic{width:auto;font-size:20px}
  #content{padding:20px 16px}
  .fg{grid-template-columns:1fr}
  .fg3{grid-template-columns:1fr 1fr}
}
@media(max-width:700px){
  :root{--sb:0px;--top:56px}
  #sidebar{display:none}
  #main{margin:0!important}
  .stats-grid{grid-template-columns:1fr 1fr}
  #topbar{padding:0 16px}
  #content{padding:16px 12px}
  .fg,.fg3{grid-template-columns:1fr}
  .modal{max-width:100%;margin:0}
  .m-body{max-height:72vh}
  .tbl-wrap{overflow-x:auto}
  table{min-width:600px}
}
</style>
</head>
<body>
<div class="orb" style="width:600px;height:600px;background:#1A3A8F;top:-200px;left:-100px;opacity:.13"></div>
<div class="orb" style="width:500px;height:500px;background:#2A1A3A;bottom:-150px;right:-80px;opacity:.11"></div>

<!-- ══ LOGIN ══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="gl2" style="border-radius:24px;padding:44px 40px;width:100%;max-width:440px;position:relative;z-index:1;animation:slideUp .5s cubic-bezier(.22,1,.36,1) both">
    <div style="text-align:center;margin-bottom:32px">
      <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;box-shadow:0 8px 24px rgba(79,143,255,.4)">▶</div>
      <h1 style="font-family:var(--fo);font-size:28px;font-weight:700">SHAHID<span style="color:var(--a)">365</span></h1>
      <p style="color:var(--t3);font-size:13px;margin-top:5px">لوحة التحكم الإدارية</p>
    </div>
    <div style="margin-bottom:14px">
      <label class="inp-label">اسم المستخدم</label>
      <input class="inp" id="l-user" placeholder="hamouda" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div style="margin-bottom:22px">
      <label class="inp-label">كلمة المرور</label>
      <input class="inp" id="l-pass" type="password" placeholder="••••••••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div id="l-err" style="display:none;background:rgba(255,95,109,.1);border:1px solid rgba(255,95,109,.28);border-radius:10px;padding:10px;color:var(--r);font-size:13px;text-align:center;margin-bottom:14px"></div>
    <button class="btn bp" style="width:100%;padding:13px;font-size:15px" id="l-btn" onclick="doLogin()">دخول →</button>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="app-wrap" style="display:none;position:relative;z-index:1">
  <!-- SIDEBAR -->
  <nav id="sidebar" class="gl">
    <div class="sb-logo">
      <div class="sb-icon-wrap">▶</div>
      <div class="sb-title">SHAHID<span style="color:var(--a)">365</span></div>
    </div>
    <div class="sb-section">المحتوى</div>
    <div class="si act" data-p="dashboard"  onclick="nav('dashboard')"> <span class="si-ic">📊</span><span class="si-lb">الرئيسية</span></div>
    <div class="si"     data-p="movies"     onclick="nav('movies')">    <span class="si-ic">🎬</span><span class="si-lb">الأفلام</span></div>
    <div class="si"     data-p="series"     onclick="nav('series')">    <span class="si-ic">📺</span><span class="si-lb">المسلسلات</span></div>
    <div class="si"     data-p="channels"   onclick="nav('channels')">  <span class="si-ic">📡</span><span class="si-lb">البث المباشر</span></div>
    <div class="si"     data-p="persons"    onclick="nav('persons')">   <span class="si-ic">🎭</span><span class="si-lb">الممثلون</span></div>
    <div class="sb-section">التسييل</div>
    <div class="si"     data-p="ads"        onclick="nav('ads')">       <span class="si-ic">📢</span><span class="si-lb">الإعلانات</span></div>
    <div class="si"     data-p="subs"       onclick="nav('subs')">      <span class="si-ic">🔑</span><span class="si-lb">الاشتراكات</span></div>
    <div class="sb-section">النظام</div>
    <div class="si"     data-p="trending"   onclick="nav('trending')">  <span class="si-ic">🔥</span><span class="si-lb">الأكثر رواجاً</span></div>
    <div class="si"     data-p="banned"     onclick="nav('banned')">    <span class="si-ic">🚫</span><span class="si-lb">حظر الـ IP</span></div>
    <div class="si"     data-p="downloads"  onclick="nav('downloads')"> <span class="si-ic">⬇️</span><span class="si-lb">إعدادات التحميل</span></div>
    <div class="si"     data-p="settings"   onclick="nav('settings')">  <span class="si-ic">⚙️</span><span class="si-lb">الإعدادات</span></div>
    <div class="sb-foot">
      <div class="si" onclick="logout()" style="color:var(--r)"><span class="si-ic">🚪</span><span class="si-lb">خروج</span></div>
    </div>
  </nav>

  <!-- MAIN -->
  <div id="main">

function collectMovieForm(){
  const castData=[...document.querySelectorAll('.cast-entry')].map(r=>{
    const ins=r.querySelectorAll('input');
    return{name:ins[0]?.value?.trim()||'',name_ar:ins[1]?.value?.trim()||'',role:ins[2]?.value?.trim()||'',photo:ins[3]?.value?.trim()||''};
  }).filter(c=>c.name||c.name_ar);
  return{
    title:          el('f-title')?.value?.trim()||'',
    title_ar:       el('f-title_ar')?.value?.trim()||'',
    orig_title:     el('f-orig_title')?.value?.trim()||'',
    description:    el('f-description')?.value?.trim()||'',
    description_ar: el('f-description_ar')?.value?.trim()||'',
    poster:         el('f-poster')?.value?.trim()||'',
    backdrop:       el('f-backdrop')?.value?.trim()||'',
    year:           +el('f-year')?.value||null,
    duration:       +el('f-duration')?.value||null,
    rating:         parseFloat(el('f-rating')?.value)||null,
    language:       el('f-language')?.value||'ar',
    type:           el('f-type')?.value||'movie',
    genres:         (el('f-genres')?.value||'').split(',').map(s=>s.trim()).filter(Boolean),
    genres_ar:      (el('f-genres_ar')?.value||'').split(',').map(s=>s.trim()).filter(Boolean),
    video_url:      el('f-video_url')?.value?.trim()||null,
    dl_url:         el('f-dl_url')?.value?.trim()||null,
    trailer_url:    el('f-trailer_url')?.value?.trim()||null,
    subtitle_url:   el('f-subtitle_url')?.value?.trim()||null,
    director_name:  el('f-director_name')?.value?.trim()||null,
    director_name_ar:el('f-director_name_ar')?.value?.trim()||null,
    featured:       el('f-featured')?.classList.contains('on')||false,
    active:         el('f-active')?.classList.contains('on')!==false,
    cast_data:      castData,
    updated_at:     new Date().toISOString(),
  };
}

async function openEditMovie(id){
  openModal('تعديل المحتوى',`<div class="loading"><div class="spin"></div></div>`,'',true);
  try{
    const{data:m,error}=await sb.from('movies').select('*').eq('id',id).single();

async function saveMovie(id,type){
  const data=collectMovieForm();
  if(!data.title_ar&&!data.title){toast('العنوان مطلوب','error');return;}
  const btn=el('m-foot')?.querySelector('.bp');
  setLoading(btn,true,'جارٍ الحفظ…');
  try{
    if(id){
      const{error}=await sb.from('movies').update(data).eq('id',id);
      if(error)throw error;
    }else{
      const{error}=await sb.from('movies').insert([{...data,created_at:new Date().toISOString()}]);

    closeModal();nav(S.page);
  }catch(e){toast(e.message,'error');}

    toast('تم الحذف ✓','success');nav(S.page);
  }catch(e){toast(e.message,'error');}
}

// ── TMDB ─────────────────────────────────────────────────
async function doTmdbSearch(type){
  const q=el('tmdb-q')?.value?.trim();
  const lng=el('tmdb-lang')?.value||'ar';
  S.tmdbLang=lng;
  if(!q)return;
  el('tmdb-res').innerHTML=`<div style="padding:10px;color:var(--t3);font-size:13px;display:flex;align-items:center;gap:8px"><div class="spin"></div> جارٍ البحث…</div>`;
  try{
    const tl=lng==='ar'?'ar-SA':'en-US';
    const r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=${tl}&include_adult=false`,{headers:{Authorization:'Bearer '+TMDB_TOK}});
    const d=await r.json();
    const results=(d.results||[]).filter(x=>['movie','tv'].includes(x.media_type)).slice(0,12);
    if(!results.length){el('tmdb-res').innerHTML=`<div style="padding:12px;color:var(--t3);font-size:13px">لا توجد نتائج</div>`;return;}
    el('tmdb-res').innerHTML=`<div class="tmdb-res">${results.map(r=>`
      <div class="tmdb-item" onclick="fillTmdb(${r.id},'${r.media_type||type}','${lng}')">
        ${r.poster_path?`<img class="tmdb-poster" src="https://image.tmdb.org/t/p/w92${r.poster_path}" loading="lazy" onerror="this.style.display='none'">`:`<div class="tmdb-poster" style="display:flex;align-items:center;justify-content:center;font-size:20px">🎬</div>`}
        <div><div style="font-weight:600;font-size:13.5px">${esc(r.title||r.name||'')}</div>
          <div style="font-size:12px;color:var(--t3);margin-top:2px">${(r.release_date||r.first_air_date||'').split('-')[0]||''} ${r.vote_average?'• ★'+r.vote_average.toFixed(1):''}</div></div>
      </div>`).join('')}</div>`;
  }catch(e){el('tmdb-res').innerHTML=`<div style="padding:10px;color:var(--r);font-size:13px">${e.message}</div>`;}
}

async function fillTmdb(tmdbId,mtype,lang){
  el('tmdb-res').innerHTML=`<div style="padding:10px;color:var(--t3);font-size:13px;display:flex;align-items:center;gap:8px"><div class="spin"></div> جارٍ جلب التفاصيل…</div>`;
  try{
    const tl=lang==='ar'?'ar-SA':'en-US';
    const mt=mtype==='tv'?'tv':'movie';
    const r=await fetch(`https://api.themoviedb.org/3/${mt}/${tmdbId}?api_key=${TMDB_KEY}&language=${tl}&append_to_response=credits,videos`,{headers:{Authorization:'Bearer '+TMDB_TOK}});
    const d=await r.json();
    const trailer=(d.videos?.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube');
    const dir=(d.credits?.crew||[]).find(c=>c.job==='Director');
    // Fill fields
    const setV=(id,v)=>{const e=el(id);if(e)e.value=v||'';};
    setV('f-title',d.title||d.name||'');
    setV('f-orig_title',d.original_title||d.original_name||'');
    setV('f-year',parseInt((d.release_date||d.first_air_date||'').split('-')[0])||'');
    setV('f-rating',d.vote_average?d.vote_average.toFixed(1):'');
    setV('f-duration',d.runtime||d.episode_run_time?.[0]||'');
    if(el('f-language'))el('f-language').value=d.original_language||'ar';
    if(el('f-poster')){el('f-poster').value=d.poster_path?`https://image.tmdb.org/t/p/w500${d.poster_path}`:'';previewImg('f-poster','pv-poster');}
    if(el('f-backdrop')){el('f-backdrop').value=d.backdrop_path?`https://image.tmdb.org/t/p/w1280${d.backdrop_path}`:'';previewImg('f-backdrop','pv-backdrop');}
    if(el('f-trailer_url'))el('f-trailer_url').value=trailer?`https://www.youtube.com/watch?v=${trailer.key}`:'';
    if(dir){setV('f-director_name',dir.name||'');}
    if(lang==='ar'){
      setV('f-description_ar',d.overview||'');
      if(el('f-genres_ar'))el('f-genres_ar').value=(d.genres||[]).map(g=>g.name).join(', ');
    }else{
      setV('f-description',d.overview||'');
      if(el('f-genres'))el('f-genres').value=(d.genres||[]).map(g=>g.name).join(', ');
    }
    // Cast
    const cont=el('cast-cont');
    if(cont){
      cont.innerHTML='';
      (d.credits?.cast||[]).slice(0,15).forEach(c=>{
        const div=document.createElement('div');div.className='cast-entry';
        div.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:8px';
        div.innerHTML=`<input class="inp" style="flex:1" placeholder="الاسم" value="${esc(c.name||'')}"/><input class="inp" style="flex:1" placeholder="الاسم (عربي)" value=""/><input class="inp" style="width:120px" placeholder="الدور" value="${esc(c.character||'')}"/><input class="inp" style="width:90px" placeholder="صورة" value="${c.profile_path?`https://image.tmdb.org/t/p/w200${c.profile_path}`:''}"/><button class="btn br btn-xs" onclick="this.closest('.cast-entry').remove()" type="button">✕</button>`;
        cont.appendChild(div);
      });
    }
    el('tmdb-res').innerHTML=`<div style="padding:10px 12px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:9px;color:var(--gr);font-size:13px">✓ تم جلب البيانات — يمكنك تعديل أي حقل قبل الحفظ.</div>`;
  }catch(e){el('tmdb-res').innerHTML=`<div style="padding:10px;color:var(--r);font-size:13px">${e.message}</div>`;}
}

function addToTrend(id){
  if(!window._trendIds)window._trendIds=[];
  if(window._trendIds.includes(id)){toast('موجود مسبقاً','warn');return;}
  if(window._trendIds.length>=20){toast('الحد الأقصى 20 عنصر','warn');return;}
  window._trendIds.push(id);renderTrending();
}
function removeFromTrend(id){window._trendIds=(window._trendIds||[]).filter(x=>x!==id);renderTrending();}
async function saveTrendOrder(){
  try{await sb.from('settings').update({trending_ids:window._trendIds||[],updated_at:new Date().toISOString()}).eq('id',1);toast('تم حفظ الترتيب ✓','success');}
  catch(e){toast(e.message,'error');}
}
async function clearTrend(){
  try{window._trendIds=[];await sb.from('settings').update({trending_ids:[],updated_at:new Date().toISOString()}).eq('id',1);toast('تم مسح الترتيب اليدوي ✓','success');renderTrending();}
  catch(e){toast(e.message,'error');}
}
// Drag & Drop
let dragSrc=null;
function dragStart(e){dragSrc=e.currentTarget;e.currentTarget.classList.add('dragging');}
function dragDrop(e){
  const target=e.currentTarget;
  if(dragSrc===target)return;
  dragSrc?.classList.remove('dragging');
  const list=el('trend-manual-list');
  const items=[...list.querySelectorAll('.trend-item')];
  const srcIdx=items.indexOf(dragSrc);
  const tgtIdx=items.indexOf(target);
  if(srcIdx<tgtIdx)list.insertBefore(dragSrc,target.nextSibling);
  else list.insertBefore(dragSrc,target);
  window._trendIds=[...list.querySelectorAll('.trend-item')].map(x=>x.dataset.id);
  items.forEach((el,i)=>{const n=el.querySelector('[style*="font-size:18px"]');if(n)n.textContent=`#${i+1}`;});
}

async function saveDownloadSettings(){
  const qp=['4K','1080p','720p','480p','360p','240p'].filter(q=>el(`qp-${q}`)?.checked);
  const codecs=['H.264','H.265/HEVC','VP9','AV1'].filter(c=>el(`codec-${c.replace('/','_')}`)?.checked);
  try{
    await sb.from('settings').update({downloads_enabled:el('dl-enabled')?.classList.contains('on'),quality_profiles:qp,allowed_codecs:codecs,updated_at:new Date().toISOString()}).eq('id',1);
    toast('تم حفظ إعدادات التحميل ✓','success');
  }catch(e){toast(e.message,'error');}
}

          <div><label class="inp-label">رسالة الصيانة (عربي)</label><textarea class="inp" id="cfg-maint-ar" rows="2">${esc(cfg?.maintenance_msg_ar||'')}</textarea></div>

async function saveSettings(){
  const btn=el('cfg-save-btn');setLoading(btn,true,'جارٍ الحفظ…');
  try{
    await sb.from('settings').update({
      site_title_ar:       el('cfg-title_ar')?.value?.trim(),
      site_title:          el('cfg-title')?.value?.trim(),
      maintenance_on:      el('cfg-maint')?.classList.contains('on'),
      maintenance_msg:     el('cfg-maint-msg')?.value?.trim(),
      maintenance_msg_ar:  el('cfg-maint-ar')?.value?.trim(),
      sub_required:        el('cfg-sub')?.classList.contains('on'),
      ads_enabled:         el('cfg-ads')?.classList.contains('on'),
      updated_at:          new Date().toISOString(),
    }).eq('id',1);
    toast('تم حفظ الإعدادات ✓','success');
  }catch(e){toast(e.message,'error');}
  setLoading(btn,false,'💾 حفظ الإعدادات');
}
